[build]
  command = "npm run build"
  publish = ".next"

[[redirects]]
  from = "/lodges-uganda"
  to = "/lodges-uganda.html"
  status = 200

[[redirects]]
  from = "/uganda-safari-operators"
  to = "/uganda-safari-operators.html"
  status = 200

[[redirects]]
  from = "/turigye-tours"
  to = "/turigye-tours.html"
  status = 200

[[redirects]]
  from = "/nturo-safaris-buhoma"
  to = "/nturo-safaris-buhoma.html"
  status = 200

[[redirects]]
  from = "/deks-safaris-murchison"
  to = "/deks-safaris-murchison.html"
  status = 200

[[redirects]]
  from = "/kampala-roads-uganda"
  to = "/kampala-roads-uganda.html"
  status = 200

[[redirects]]
  from = "/best-lodges-uganda"
  to = "/best-lodges-uganda.html"
  status = 200

[[redirects]]
  from = "/safari-lodges-uganda"
  to = "/safari-lodges-uganda.html"
  status = 200

[[redirects]]
  from = "/lodges-bwindi-gorilla-trekking"
  to = "/lodges-bwindi-gorilla-trekking.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
