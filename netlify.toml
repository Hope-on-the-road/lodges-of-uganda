[build]
  command = "npm run build"
  publish = ".next"

[[redirects]]
  from = "/lodges-uganda"
  to = "/lodges-uganda.html"
  status = 200

[[redirects]]
  from = "/uganda-safari-operators"
  to = "/uganda-safari-operators.html"
  status = 200

[[redirects]]
  from = "/turigye-tours"
  to = "/turigye-tours.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
